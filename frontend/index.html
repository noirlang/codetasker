<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="CodeTasker — Two-way GitHub TODO sync for engineering teams. Automatically track, manage, and inject TODO/FIXME comments as GitHub issues."
    />
    <title>CodeTasker — GitHub TODO Sync</title>

    <!-- Favicon placeholder -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Google Fonts: preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Inter: primary UI font -->
    <!-- JetBrains Mono: code / monospace font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <style>
      /* Prevent flash of unstyled content before React hydrates */
      body {
        background-color: #0a0a0a;
        color: #ffffff;
        margin: 0;
        padding: 0;
      }
    </style>
  </head>
  <body>
    <!-- React root mount point -->
    <div id="root"></div>

    <!-- Vite entry point -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
