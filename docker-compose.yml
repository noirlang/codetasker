# ============================================================
# CodeTasker — Docker Compose (Production)
#
# USAGE:
#   docker compose up -d --build    → Build & start everything
#   docker compose down             → Stop everything
#   docker compose logs -f          → Watch logs
#
# REQUIREMENTS:
#   Copy .env.example to .env and fill in your credentials.
# ============================================================

services:

  # ----------------------------------------------------------
  # MongoDB — primary datastore
  # ----------------------------------------------------------
  mongo:
    image: mongo:7.0
    container_name: codetasker_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: codetasker
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - codetasker_net

  # ----------------------------------------------------------
  # Go Fiber Backend API
  # ----------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: codetasker-backend
    container_name: codetasker_backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    env_file: .env
    environment:
      PORT: 8080
      MONGO_URI: mongodb://mongo:27017
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - codetasker_net

  # ----------------------------------------------------------
  # React Frontend — Production build served via Nginx
  # ----------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: codetasker-frontend
    container_name: codetasker_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    networks:
      - codetasker_net

networks:
  codetasker_net:
    driver: bridge

volumes:
  mongo_data:
    driver: local
